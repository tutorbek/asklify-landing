<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asklify — Coming Soon</title>
  <link rel="icon" href="18Ask.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4ff;
      --accent: #0051ff;
      --accent2: #00b4d8;
      --dark: #0a1628;
      --mid: #4a5568;
      --grid: rgba(0,81,255,0.055);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--dark);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    #cursor {
      position: fixed; z-index: 9999;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      left: 0; top: 0;
      transform: translate(-50%, -50%);
      transition: width .18s, height .18s, background .18s;
      box-shadow: 0 0 14px rgba(0,81,255,0.55);
      will-change: left, top;
    }
    #cursor.hov { width: 20px; height: 20px; background: var(--accent2); box-shadow: 0 0 18px rgba(0,180,216,0.7); }
    #cursor-ring {
      position: fixed; z-index: 9998;
      width: 36px; height: 36px;
      border: 1.5px solid rgba(0,81,255,0.3);
      border-radius: 50%;
      pointer-events: none;
      left: 0; top: 0;
      transform: translate(-50%, -50%);
      transition: width .25s, height .25s, border-color .25s;
      will-change: left, top;
    }
    #cursor-ring.hov { width: 50px; height: 50px; border-color: rgba(0,180,216,0.45); }

    /* ── CANVAS ── */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; }

    /* ── GRID ── */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 56px 56px;
    }

    /* ── SCAN LINE ── */
    .scanline {
      position: fixed; left: 0; right: 0; height: 1px; z-index: 2;
      background: linear-gradient(90deg, transparent, rgba(0,81,255,0.25), transparent);
      animation: scan 7s linear infinite;
    }
    @keyframes scan { from { top: 0; } to { top: 100vh; } }

    /* ── RINGS ── */
    .rings {
      position: fixed; z-index: 2;
      width: min(700px, 100vmin); height: min(700px, 100vmin);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid transparent;
    }
    .ring:nth-child(1) { border-color: rgba(0,81,255,0.07);  animation: spin 34s linear infinite; }
    .ring:nth-child(2) { inset: 10%; border-color: rgba(0,180,216,0.08); animation: spin 23s linear infinite reverse; }
    .ring:nth-child(3) { inset: 22%; border-top-color: rgba(0,81,255,0.1); animation: spin 17s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .rdot {
      position: absolute; width: 5px; height: 5px;
      border-radius: 50%; top: -2.5px; left: calc(50% - 2.5px);
    }
    .rdot.blue { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .rdot.teal { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

    /* ── CORNERS ── */
    .corner { position: fixed; z-index: 5; width: 50px; height: 50px; pointer-events: none; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent); opacity: .25; }
    .corner::before { width: 2px; height: 100%; }
    .corner::after  { width: 100%; height: 2px; }
    .corner.tl { top: 22px; left: 22px; }
    .corner.tr { top: 22px; right: 22px; transform: scaleX(-1); }
    .corner.bl { bottom: 22px; left: 22px; transform: scaleY(-1); }
    .corner.br { bottom: 22px; right: 22px; transform: scale(-1); }

    /* ── SIDE TEXT ── */
    .side-text {
      position: fixed; z-index: 5; pointer-events: none;
      font-family: 'Orbitron', monospace; font-size: .48rem;
      letter-spacing: .3em; color: rgba(0,81,255,0.22);
    }
    .side-text.left  { left: 1.4rem; top: 50%; transform: translateX(-50%) translateY(-50%) rotate(-90deg); }
    .side-text.right { right: 1.4rem; top: 50%; transform: translateX(50%) translateY(-50%) rotate(90deg); }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; padding: 2rem;
    }

    /* ── BADGE ── */
    .badge {
      font-family: 'Orbitron', monospace; font-size: .58rem;
      letter-spacing: .35em; color: var(--accent);
      border: 1px solid rgba(0,81,255,0.18);
      padding: .38rem 1.1rem; border-radius: 2px;
      margin-bottom: 1.8rem;
      background: rgba(0,81,255,0.04);
      position: relative;
      opacity: 0; animation: up .8s .2s forwards;
    }
    .badge::before, .badge::after {
      content: ''; position: absolute; top: 50%;
      width: 5px; height: 5px; background: var(--accent);
      transform: translateY(-50%) rotate(45deg);
      box-shadow: 0 0 5px var(--accent);
    }
    .badge::before { left: -2.5px; }
    .badge::after  { right: -2.5px; }

    /* ── LOGO ── */
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3.2rem, 10vw, 8rem);
      font-weight: 900; letter-spacing: -.02em; line-height: 1;
      text-align: center;
      opacity: 0; animation: up .9s .4s forwards;
    }
    .logo .ask { color: var(--dark); }
    .logo .lify {
      color: var(--accent); position: relative;
      text-shadow: 0 0 35px rgba(0,81,255,0.18);
    }
    .logo .lify::after {
      content: 'lify'; position: absolute; left: 0; top: 0;
      color: var(--accent2);
      clip-path: polygon(0 20%,100% 20%,100% 45%,0 45%);
      animation: glitch 5s infinite; opacity: 0;
    }
    @keyframes glitch {
      0%,88%,100%{ transform:none; opacity:0; }
      90%{ transform:translate(-3px,1px); opacity:.55; }
      92%{ transform:translate(3px,-1px); opacity:.25; }
      94%{ transform:translate(-1px,2px); opacity:.45; }
    }

    /* ── DOMAIN ── */
    .domain {
      font-family: 'Orbitron', monospace;
      font-size: clamp(.62rem, 1.3vw, .88rem);
      color: rgba(0,81,255,0.38); letter-spacing: .22em;
      margin-top: .45rem; margin-bottom: 1.8rem;
      opacity: 0; animation: up .7s .6s forwards;
    }

    /* ── TAGLINE ── */
    .tagline {
      font-size: clamp(.9rem, 2.1vw, 1.25rem); font-weight: 300;
      letter-spacing: .07em; color: var(--mid);
      text-align: center; max-width: 440px; line-height: 1.75;
      margin-bottom: 2.4rem;
      opacity: 0; animation: up .7s .8s forwards;
    }
    .tagline span { color: var(--accent); font-weight: 500; }

    /* ── TELEGRAM BTN ── */
    .tg-btn {
      display: inline-flex; align-items: center; gap: .65rem;
      font-family: 'Orbitron', monospace; font-size: .68rem;
      font-weight: 700; letter-spacing: .14em;
      color: #fff; background: var(--accent);
      padding: .88rem 2rem; border-radius: 3px;
      text-decoration: none;
      margin-bottom: 2.6rem;
      opacity: 0; animation: up .7s 1s forwards;
      transition: background .3s, box-shadow .3s, transform .2s;
      position: relative; overflow: hidden;
    }
    .tg-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: translateX(-100%); transition: transform .5s;
    }
    .tg-btn:hover { background: #003ecc; box-shadow: 0 6px 28px rgba(0,81,255,0.3); transform: translateY(-2px); }
    .tg-btn:hover::before { transform: translateX(100%); }

    /* ── COUNTDOWN ── */
    .countdown {
      display: flex; gap: clamp(.5rem, 2.5vw, 2rem); align-items: flex-start;
      margin-bottom: 2.8rem;
      opacity: 0; animation: up .7s 1.2s forwards;
      flex-wrap: nowrap; width: 100%; justify-content: center;
      max-width: min(520px, 95vw);
    }
    .cd-unit { text-align: center; flex: 1; min-width: 0; }
    .cd-num {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.3rem, 6vw, 3.4rem);
      font-weight: 700; color: var(--accent); line-height: 1;
      display: block;
      text-shadow: 0 0 18px rgba(0,81,255,0.18);
    }
    .cd-label {
      font-size: clamp(.38rem, 1.1vw, .58rem);
      letter-spacing: .15em; color: rgba(10,22,40,0.32); margin-top: .28rem;
    }
    .cd-sep {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 4vw, 2.6rem);
      color: rgba(0,81,255,0.18); line-height: 1; padding-top: .05em;
      flex-shrink: 0;
    }

    /* ── STATUS ── */
    .status-row {
      display: flex; gap: 1.6rem; flex-wrap: wrap; justify-content: center;
      opacity: 0; animation: up .7s 1.4s forwards;
    }
    .status-item {
      display: flex; align-items: center; gap: .42rem;
      font-size: .68rem; letter-spacing: .11em; color: rgba(10,22,40,0.38);
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    .dot.b { background:#0051ff; box-shadow:0 0 6px #0051ff; }
    .dot.t { background:#00b4d8; box-shadow:0 0 6px #00b4d8; animation-delay:.65s; }
    .dot.v { background:#7c3aed; box-shadow:0 0 6px #7c3aed; animation-delay:1.3s; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.3;transform:scale(.6);} }

    @keyframes up {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width:600px) {
      .side-text { display:none; }
      .countdown { gap:.9rem; }
      .cd-sep { font-size:1.8rem; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<div class="rings">
  <div class="ring"><div class="rdot blue"></div></div>
  <div class="ring"><div class="rdot teal"></div></div>
  <div class="ring"></div>
</div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="side-text left">ASKLIFY.ME // v0.1-ALPHA</div>
<div class="side-text right">AI-POWERED // NEXT-GEN</div>

<main>
  <div class="badge" id="badge">INITIALIZING SYSTEM</div>

  <div class="logo">
    <span class="ask">ASK</span><span class="lify">lify</span>
  </div>
  <div class="domain">asklify.me</div>

  <p class="tagline">
    The future of <span>intelligent answers</span> is loading.<br/>
    Something extraordinary is being built.
  </p>

  <a class="tg-btn" href="https://t.me/bkzd19" target="_blank">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
    </svg>
    MY TELEGRAM
  </a>

  <div class="countdown">
    <div class="cd-unit"><span class="cd-num" id="cd-d">000</span><div class="cd-label">DAYS</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><span class="cd-num" id="cd-h">00</span><div class="cd-label">HRS</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><span class="cd-num" id="cd-m">00</span><div class="cd-label">MIN</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><span class="cd-num" id="cd-s">00</span><div class="cd-label">SEC</div></div>
  </div>

  <div class="status-row">
    <div class="status-item"><div class="dot b"></div> SYSTEMS ONLINE</div>
    <div class="status-item"><div class="dot t"></div> AI TRAINING</div>
    <div class="status-item"><div class="dot v"></div> BETA INCOMING</div>
  </div>
</main>

<script>
/* ── 1. CURSOR ── */
const curEl  = document.getElementById('cursor');
const ringEl = document.getElementById('cursor-ring');
let cx = -50, cy = -50, rx = -50, ry = -50;

document.addEventListener('mousemove', e => {
  cx = e.clientX; cy = e.clientY;
  curEl.style.left = cx + 'px';
  curEl.style.top  = cy + 'px';
}, { passive: true });

(function trackRing() {
  rx += (cx - rx) * 0.11;
  ry += (cy - ry) * 0.11;
  ringEl.style.left = rx + 'px';
  ringEl.style.top  = ry + 'px';
  requestAnimationFrame(trackRing);
})();

document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => { curEl.classList.add('hov'); ringEl.classList.add('hov'); });
  el.addEventListener('mouseleave', () => { curEl.classList.remove('hov'); ringEl.classList.remove('hov'); });
});

/* ── 2. PARTICLE CANVAS ── */
const cv  = document.getElementById('bg-canvas');
const ctx = cv.getContext('2d');
let W, H;
function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

class P {
  constructor() { this.init(true); }
  init(rand) {
    this.x = Math.random()*W; this.y = rand ? Math.random()*H : -5;
    this.vx = (Math.random()-.5)*.22; this.vy = (Math.random()-.5)*.22;
    this.r = Math.random()*1.3+.3;
    this.life = 0; this.max = Math.random()*320+160;
    this.h = Math.random()<.6 ? 220 : 195;
  }
  tick() {
    this.x+=this.vx; this.y+=this.vy; this.life++;
    if(this.life>this.max||this.x<-8||this.x>W+8||this.y<-8||this.y>H+8) this.init(false);
  }
  draw() {
    const a = Math.sin(this.life/this.max*Math.PI)*.22;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.h},85%,52%,${a})`; ctx.fill();
  }
}
const pts = Array.from({length:130},()=>new P());

let orbX=W/2, orbY=H/2;
document.addEventListener('mousemove', e => { orbX+=(e.clientX-orbX)*.04; orbY+=(e.clientY-orbY)*.04; });

(function frame() {
  ctx.clearRect(0,0,W,H);
  // bg glow
  const g = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.5);
  g.addColorStop(0,'rgba(205,215,255,0.45)'); g.addColorStop(.7,'rgba(225,232,255,0.15)'); g.addColorStop(1,'rgba(240,244,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // mouse orb
  const mo = ctx.createRadialGradient(orbX,orbY,0,orbX,orbY,170);
  mo.addColorStop(0,'rgba(0,81,255,0.04)'); mo.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mo; ctx.fillRect(0,0,W,H);
  // connections
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++) {
    const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
    if(d<82){ ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
      ctx.strokeStyle=`rgba(0,81,255,${(1-d/82)*.038})`; ctx.lineWidth=.5; ctx.stroke(); }
  }
  pts.forEach(p=>{p.tick();p.draw();});
  requestAnimationFrame(frame);
})();

/* ── 3. COUNTDOWN: 400 days from 2026-03-06 ── */
const START = new Date('2026-03-06T00:00:00');
const TOTAL = 400*24*60*60*1000;
function tick() {
  let diff = Math.max(0, TOTAL - (new Date() - START));
  const d=Math.floor(diff/864e5); diff%=864e5;
  const h=Math.floor(diff/36e5);  diff%=36e5;
  const m=Math.floor(diff/6e4);   diff%=6e4;
  const s=Math.floor(diff/1e3);
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('cd-d').textContent = String(d).padStart(3,'0');
  document.getElementById('cd-h').textContent = p(h);
  document.getElementById('cd-m').textContent = p(m);
  document.getElementById('cd-s').textContent = p(s);
}
tick(); setInterval(tick,1000);

/* ── 4. BADGE CYCLE ── */
const MSGS=['INITIALIZING SYSTEM','LOADING AI CORE','WARMING UP MODELS','ALMOST READY'];
let mi=0; const bdg=document.getElementById('badge');
setInterval(()=>{
  bdg.style.transition='opacity .28s'; bdg.style.opacity='0';
  setTimeout(()=>{ mi=(mi+1)%MSGS.length; bdg.textContent=MSGS[mi]; bdg.style.opacity='1'; },300);
},3000);
</script>
</body>
</html>
