<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asklify — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020508;
      --cyan: #00f5ff;
      --blue: #0062ff;
      --violet: #7000ff;
      --white: #e8f4ff;
      --dim: rgba(0,245,255,0.07);
      --glow: 0 0 30px rgba(0,245,255,0.4);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    /* ── CUSTOM CURSOR ── */
    #cursor {
      position: fixed; z-index: 9999;
      width: 14px; height: 14px;
      background: var(--cyan);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      transition: width .2s, height .2s, opacity .2s;
      mix-blend-mode: screen;
      box-shadow: 0 0 18px var(--cyan), 0 0 40px rgba(0,245,255,0.3);
    }
    #cursor-ring {
      position: fixed; z-index: 9998;
      width: 38px; height: 38px;
      border: 1px solid rgba(0,245,255,0.5);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      transition: transform .12s ease, width .3s, height .3s;
    }

    /* ── CANVAS BACKGROUND ── */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 0;
    }

    /* ── GRID OVERLAY ── */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPulse 8s ease-in-out infinite;
    }
    @keyframes gridPulse {
      0%,100% { opacity: .6; }
      50%      { opacity: 1; }
    }

    /* ── SCAN LINE ── */
    .scanline {
      position: fixed; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      z-index: 2;
      animation: scan 6s linear infinite;
      opacity: .18;
    }
    @keyframes scan { from { top: -2px; } to { top: 100vh; } }

    /* ── NOISE ── */
    .noise {
      position: fixed; inset: 0; z-index: 3;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      opacity: .4; pointer-events: none;
    }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; width: 100%;
      padding: 2rem;
      gap: 0;
    }

    /* ── TOP BADGE ── */
    .badge {
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: .35em;
      color: var(--cyan);
      border: 1px solid rgba(0,245,255,0.25);
      padding: .45rem 1.2rem;
      border-radius: 2px;
      margin-bottom: 2.5rem;
      position: relative;
      opacity: 0;
      animation: fadeUp .8s .3s forwards;
      background: rgba(0,245,255,0.04);
    }
    .badge::before, .badge::after {
      content: '';
      position: absolute; top: 50%; width: 6px; height: 6px;
      background: var(--cyan);
      transform: translateY(-50%) rotate(45deg);
      box-shadow: 0 0 8px var(--cyan);
    }
    .badge::before { left: -3px; }
    .badge::after  { right: -3px; }

    /* ── LOGO ── */
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 900;
      letter-spacing: -.02em;
      line-height: 1;
      position: relative;
      opacity: 0;
      animation: fadeUp .9s .5s forwards;
      text-align: center;
    }
    .logo .ask {
      color: var(--white);
      text-shadow: 0 0 60px rgba(255,255,255,0.15);
    }
    .logo .lify {
      color: var(--cyan);
      text-shadow: 0 0 40px rgba(0,245,255,0.6), 0 0 80px rgba(0,245,255,0.3);
      position: relative;
    }
    .logo .lify::after {
      content: 'lify';
      position: absolute; left: 0; top: 0;
      color: var(--cyan);
      text-shadow: none;
      animation: glitch1 4s infinite;
      clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
      opacity: .5;
    }
    @keyframes glitch1 {
      0%,90%,100% { transform: none; opacity: .5; }
      92% { transform: translate(-4px, 2px); opacity: .8; }
      94% { transform: translate(4px,-2px); opacity: .3; }
      96% { transform: translate(-2px, 1px); opacity: .7; }
    }

    /* ── DOMAIN TAG ── */
    .domain {
      font-family: 'Orbitron', monospace;
      font-size: clamp(.7rem, 1.5vw, 1rem);
      color: rgba(0,245,255,0.45);
      letter-spacing: .2em;
      margin-top: .6rem;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp .7s .7s forwards;
    }

    /* ── TAGLINE ── */
    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      letter-spacing: .08em;
      color: rgba(232,244,255,0.6);
      text-align: center;
      max-width: 500px;
      line-height: 1.7;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp .7s .9s forwards;
    }
    .tagline span {
      color: var(--cyan);
      font-weight: 500;
    }

    /* ── EMAIL FORM ── */
    .form-wrap {
      display: flex; gap: 0;
      width: min(480px, 90vw);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp .7s 1.1s forwards;
    }
    .form-wrap input {
      flex: 1;
      background: rgba(0,245,255,0.04);
      border: 1px solid rgba(0,245,255,0.2);
      border-right: none;
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: .05em;
      padding: .85rem 1.2rem;
      outline: none;
      transition: border-color .3s, background .3s;
      border-radius: 2px 0 0 2px;
    }
    .form-wrap input::placeholder { color: rgba(232,244,255,0.25); }
    .form-wrap input:focus {
      border-color: var(--cyan);
      background: rgba(0,245,255,0.07);
    }
    .form-wrap button {
      background: var(--cyan);
      color: #000;
      font-family: 'Orbitron', monospace;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      border: none;
      padding: .85rem 1.5rem;
      cursor: none;
      transition: background .3s, box-shadow .3s;
      border-radius: 0 2px 2px 0;
      white-space: nowrap;
    }
    .form-wrap button:hover {
      background: #fff;
      box-shadow: 0 0 30px rgba(0,245,255,0.6);
    }
    #success-msg {
      display: none;
      color: var(--cyan);
      font-size: .9rem;
      letter-spacing: .1em;
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp .5s forwards;
    }

    /* ── COUNTDOWN ── */
    .countdown {
      display: flex; gap: 2.5rem;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp .7s 1.3s forwards;
    }
    .cd-unit { text-align: center; }
    .cd-num {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 30px rgba(0,245,255,0.5);
      line-height: 1;
      display: block;
      min-width: 2.5ch;
    }
    .cd-label {
      font-size: .65rem;
      letter-spacing: .25em;
      color: rgba(232,244,255,0.3);
      margin-top: .3rem;
    }
    .cd-sep {
      font-family: 'Orbitron', monospace;
      font-size: 2.5rem;
      color: rgba(0,245,255,0.2);
      line-height: 1;
      align-self: flex-start;
      padding-top: .05em;
    }

    /* ── BOTTOM STATUS ── */
    .status-row {
      display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;
      opacity: 0;
      animation: fadeUp .7s 1.5s forwards;
    }
    .status-item {
      display: flex; align-items: center; gap: .5rem;
      font-size: .75rem; letter-spacing: .12em;
      color: rgba(232,244,255,0.35);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }
    .dot.amber { background: #ffb800; box-shadow: 0 0 8px #ffb800; animation-delay: .7s; }
    .dot.violet { background: #a855f7; box-shadow: 0 0 8px #a855f7; animation-delay: 1.4s; }
    @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.4; transform:scale(.7); } }

    /* ── CORNER DECORATIONS ── */
    .corner {
      position: fixed; z-index: 5;
      width: 60px; height: 60px;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: ''; position: absolute;
      background: var(--cyan);
      opacity: .5;
    }
    .corner::before { width: 2px; height: 100%; }
    .corner::after  { width: 100%; height: 2px; }
    .corner.tl { top: 24px; left: 24px; }
    .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .corner.br { bottom: 24px; right: 24px; transform: scale(-1); }

    /* ── SIDE LINES ── */
    .side-text {
      position: fixed; z-index: 5;
      font-family: 'Orbitron', monospace;
      font-size: .55rem;
      letter-spacing: .3em;
      color: rgba(0,245,255,0.2);
      pointer-events: none;
    }
    .side-text.left  { left: 1.8rem; top: 50%; transform: translateX(-50%) translateY(-50%) rotate(-90deg); }
    .side-text.right { right: 1.8rem; top: 50%; transform: translateX(50%) translateY(-50%) rotate(90deg); }

    /* ── UTILITY ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── ORBITING RINGS ── */
    .rings {
      position: fixed; z-index: 2;
      width: min(700px, 100vmin);
      height: min(700px, 100vmin);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid transparent;
    }
    .ring:nth-child(1) {
      border-color: rgba(0,245,255,0.06);
      animation: spin 30s linear infinite;
    }
    .ring:nth-child(2) {
      inset: 8%;
      border-color: rgba(0,98,255,0.08);
      animation: spin 22s linear infinite reverse;
    }
    .ring:nth-child(3) {
      inset: 20%;
      border-top-color: rgba(0,245,255,0.12);
      animation: spin 16s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PARTICLE DOT ON RING ── */
    .ring-dot {
      position: absolute;
      width: 5px; height: 5px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--cyan);
      top: -2.5px; left: calc(50% - 2.5px);
    }

    @media (max-width: 600px) {
      .side-text { display: none; }
      .countdown { gap: 1.2rem; }
      .cd-sep { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<!-- Cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Backgrounds -->
<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>
<div class="noise"></div>

<!-- Rings -->
<div class="rings">
  <div class="ring"><div class="ring-dot"></div></div>
  <div class="ring"><div class="ring-dot"></div></div>
  <div class="ring"></div>
</div>

<!-- Corner deco -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="side-text left">ASKLIFY.ME // v0.1-ALPHA</div>
<div class="side-text right">AI-POWERED // NEXT-GEN</div>

<!-- MAIN -->
<main>
  <div class="badge">INITIALIZING SYSTEM</div>

  <div class="logo">
    <span class="ask">ASK</span><span class="lify">lify</span>
  </div>
  <div class="domain">asklify.me</div>

  <p class="tagline">
    The future of <span>intelligent answers</span> is loading.<br/>
    Something extraordinary is being built.
  </p>

  <div class="form-wrap" id="form-wrap">
    <input type="email" id="email-input" placeholder="Enter your email to get early access" />
    <button onclick="handleSubmit()">NOTIFY ME</button>
  </div>
  <div id="success-msg">✦ You're on the list. We'll reach out soon.</div>

  <div class="countdown">
    <div class="cd-unit">
      <span class="cd-num" id="cd-d">00</span>
      <div class="cd-label">DAYS</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-unit">
      <span class="cd-num" id="cd-h">00</span>
      <div class="cd-label">HRS</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-unit">
      <span class="cd-num" id="cd-m">00</span>
      <div class="cd-label">MIN</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-unit">
      <span class="cd-num" id="cd-s">00</span>
      <div class="cd-label">SEC</div>
    </div>
  </div>

  <div class="status-row">
    <div class="status-item"><div class="dot"></div> SYSTEMS ONLINE</div>
    <div class="status-item"><div class="dot amber"></div> AI TRAINING</div>
    <div class="status-item"><div class="dot violet"></div> BETA INCOMING</div>
  </div>
</main>

<script>
  /* ── CURSOR ── */
  const cur = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  function animCursor() {
    cur.style.left = mx + 'px'; cur.style.top = my + 'px';
    rx += (mx - rx) * .12; ry += (my - ry) * .12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animCursor);
  }
  animCursor();

  /* ── PARTICLE CANVAS ── */
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.vx = (Math.random() - .5) * .3;
      this.vy = (Math.random() - .5) * .3;
      this.r = Math.random() * 1.5 + .3;
      this.alpha = Math.random() * .4 + .05;
      this.life = 0;
      this.maxLife = Math.random() * 300 + 200;
      this.hue = Math.random() < .7 ? 186 : 220 + Math.random()*60;
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      this.life++;
      if (this.life > this.maxLife || this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      const prog = this.life / this.maxLife;
      const a = this.alpha * Math.sin(prog * Math.PI);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${this.hue},100%,70%,${a})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < 160; i++) particles.push(new Particle());

  /* Connection lines */
  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 90) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(0,245,255,${(1-dist/90)*.05})`;
          ctx.lineWidth = .5;
          ctx.stroke();
        }
      }
    }
  }

  /* Radial glow */
  function drawGlow() {
    const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*.6);
    g.addColorStop(0, 'rgba(0,62,80,0.18)');
    g.addColorStop(.5, 'rgba(0,10,30,0.10)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  /* Mouse-reactive orb */
  let orbX = W/2, orbY = H/2;
  document.addEventListener('mousemove', e => {
    orbX += (e.clientX - orbX) * .03;
    orbY += (e.clientY - orbY) * .03;
  });

  function loop() {
    ctx.clearRect(0, 0, W, H);
    drawGlow();
    /* mouse orb */
    const go = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, 200);
    go.addColorStop(0, 'rgba(0,245,255,0.04)');
    go.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = go;
    ctx.fillRect(0, 0, W, H);
    drawConnections();
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();

  /* ── COUNTDOWN ── 400 kun, 2026-03-06 dan boshlab orqaga ── */
  const startDate = new Date('2026-03-06T00:00:00');
  const totalMs = 400 * 24 * 60 * 60 * 1000;
  function updateCD() {
    const now = new Date();
    const elapsed = now - startDate;
    let diff = Math.max(0, totalMs - elapsed);
    const d = Math.floor(diff/864e5); diff %= 864e5;
    const h = Math.floor(diff/36e5); diff %= 36e5;
    const m = Math.floor(diff/6e4); diff %= 6e4;
    const s = Math.floor(diff/1e3);
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('cd-d').textContent = pad(d);
    document.getElementById('cd-h').textContent = pad(h);
    document.getElementById('cd-m').textContent = pad(m);
    document.getElementById('cd-s').textContent = pad(s);
  }
  updateCD(); setInterval(updateCD, 1000);

  /* ── FORM SUBMIT ── */
  function handleSubmit() {
    const val = document.getElementById('email-input').value.trim();
    if (!val || !val.includes('@')) {
      document.getElementById('email-input').style.borderColor = '#ff4444';
      setTimeout(() => document.getElementById('email-input').style.borderColor = '', 1200);
      return;
    }
    document.getElementById('form-wrap').style.display = 'none';
    const msg = document.getElementById('success-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.opacity = 1, 10);
  }

  /* ── BADGE TEXT CYCLE ── */
  const msgs = ['INITIALIZING SYSTEM','LOADING AI CORE','WARMING UP MODELS','ALMOST READY'];
  let mi = 0;
  const badge = document.querySelector('.badge');
  setInterval(() => {
    mi = (mi+1) % msgs.length;
    badge.style.opacity = 0;
    setTimeout(() => { badge.textContent = msgs[mi]; badge.style.opacity = 1; badge.style.transition = 'opacity .4s'; }, 300);
  }, 3000);
</script>
</body>
</html>
